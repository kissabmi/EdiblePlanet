name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'native/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build EdiblePlanet.exe
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /EHsc /O2 /DUNICODE /D_UNICODE native\EdiblePlanet.cpp /Fe:EdiblePlanet.exe user32.lib gdi32.lib shell32.lib
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdiblePlanet-Windows
          path: EdiblePlanet.exe
